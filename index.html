<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <!-- https://developer.mozilla.org/en-US/docs/Web/HTTP/CSP -->
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: blob: asset: http://asset.localhost https://asset.localhost; media-src 'self'; connect-src 'self' https: http://localhost:5173 ws://localhost:5173 ipc: http://ipc.localhost;">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ML-Maid</title>
  <style>
    html,
    body {
      width: 100vw;
      height: 100vh;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    #app {
      width: 100vw;
      /* Adjust height to account for the title bar */
      /* This ensures the app fills the remaining space below the title bar */
      height: calc(100vh - 50px);
      overflow: hidden;
    }

    button {
      -webkit-app-region: no-drag;
    }

    .titlebar {
      font-size: 24px;
      font-weight: bold;
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      height: 50px;
      border-bottom: 1px solid var(--titlebar-border);
      padding: 0 20px;
      user-select: none;
      -webkit-app-region: drag;
    }

    /* main-window title */
    .main-titlebar {
      background: var(--titlebar-main-bg);
      color: var(--primary, #4080ff);
    }

    .titlebar-title {
      display: flex;
      align-items: center;
      font-size: 20px;
      font-weight: bold;
      color: var(--primary, #4080ff);
      -webkit-app-region: drag;
      margin-left: -14px;
    }

    .titlebar-title img {
      width: 38px;
      height: 38px;
      vertical-align: middle;
    }

    .titlebar-title span {
      margin-left: 10px;
      font-size: 24px;
      color: var(--primary, #4080ff);
      font-weight: bold;
    }

    .titlebar-divider {
      width: 1px;
      height: 28px;
      background: var(--titlebar-border);
      margin: 0 15px;
    }

    .titlebar-buttons-container {
      width: 15%;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-left: -3px;
    }

    .titlebar-button {
      background: transparent;
      color: var(--titlebar-button);
      border: none;
      border-radius: var(--radius-sm, 6px);
      padding: 0;
      cursor: pointer;
      transition: background-color var(--duration-fast, 150ms) var(--ease-standard, ease),
        color var(--duration-fast, 150ms) var(--ease-standard, ease);
      -webkit-app-region: no-drag;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
    }

    .titlebar-button svg {
      opacity: 0.8;
      width: 30px;
      height: 30px;
    }

    .titlebar-button:hover {
      background: var(--primary-tint, rgba(64, 128, 255, 0.10));
      color: var(--primary, #4080ff);
    }

    .titlebar-button:active {
      background: var(--primary-tint-strong, rgba(64, 128, 255, 0.18));
    }

    .titlebar-button-active {
      background: var(--primary-tint-strong, rgba(64, 128, 255, 0.18));
      width: auto;
      padding: 0 10px;
    }

    .filter-badge {
      font-size: 12px;
      color: var(--primary, #4080ff);
      font-weight: 600;
      white-space: nowrap;
    }

    .titlebar-search-container {
      display: flex;
      align-items: center;
      margin-left: 10px;
      -webkit-app-region: no-drag;
      position: relative;
    }

    .titlebar-search-icon {
      position: absolute;
      left: 8px;
      top: 50%;
      transform: translateY(-50%);
      width: 24px;
      height: 24px;
      color: var(--color-muted-dark, #909399);
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .titlebar-search-input {
      width: 300px;
      height: 28px;
      padding: 4px 12px 4px 36px;
      font-size: 13px;
      border: 1px solid var(--primary-tint-strong, rgba(64, 128, 255, 0.18));
      border-radius: var(--radius-sm, 6px);
      background: rgba(255, 255, 255, 0.9);
      color: var(--color-info-content, #303133);
      outline: none;
      transition: border-color var(--duration-fast, 150ms) var(--ease-standard, ease),
        background-color var(--duration-fast, 150ms) var(--ease-standard, ease),
        box-shadow var(--duration-fast, 150ms) var(--ease-standard, ease);
      -webkit-app-region: no-drag;
    }

    .titlebar-search-input:focus {
      border-color: var(--primary, #4080ff);
      background: #ffffff;
      box-shadow: 0 0 0 2px var(--primary-tint, rgba(64, 128, 255, 0.10));
    }

    .titlebar-search-input::placeholder {
      color: var(--color-muted-dark, #909399);
      font-size: 13px;
    }

    /* Dark theme backgrounds for search input (colors adapt via tokens) */
    html.dark .titlebar-search-input {
      background: rgba(42, 42, 42, 0.9);
    }

    html.dark .titlebar-search-input:focus {
      background: #2a2a2a;
    }

    /* Tauri custom window controls (decorations: false) */
    .titlebar-window-controls {
      margin-left: auto;
      margin-right: -20px;
      /* cancel titlebar padding so buttons reach the window edge */
      display: flex;
      align-self: stretch;
      -webkit-app-region: no-drag;
    }

    .titlebar-window-control {
      width: 46px;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      border-radius: 0;
      background: transparent;
      color: var(--titlebar-button);
      padding: 0;
      cursor: default;
    }

    .titlebar-window-control:hover {
      background: rgba(128, 128, 128, 0.25);
    }

    .titlebar-window-control.close:hover {
      background: #e81123;
      color: #ffffff;
    }
  </style>
</head>

<body>
  <!-- mount your title bar at the top of you application's body tag -->
  <div id="titlebar" class="titlebar"></div>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
